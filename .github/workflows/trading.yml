name: Trading212 Bot

on:
  schedule:
    # Run at 9 AM UTC on weekdays (Mon-Fri)
    - cron: '0 9 * * 1-5'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trading:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run Trading Bot
        env:
          SECRET_TRADING212_USERNAME: ${{ secrets.SECRET_TRADING212_USERNAME }}
          SECRET_TRADING212_PASSWORD: ${{ secrets.SECRET_TRADING212_PASSWORD }}
        run: python bot_example.py

      - name: Upload logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: |
            *.log
            userdata/
